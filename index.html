<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>مساري - نظام إدارة الحياة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;direction:rtl;min-height:100vh;transition:background .3s,color .3s}
body.dark{background:#0a0f1e;color:#e2e8f0}
body.light{background:#f0f4f8;color:#1a2535}
input,select,textarea,button{font-family:'Tajawal',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(110,231,183,.3);border-radius:4px}
input[type=time]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}

/* LAYOUT */
#header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
body.dark #header{background:rgba(10,15,30,.9);border-bottom:1px solid rgba(255,255,255,.07)}
body.light #header{background:rgba(240,244,248,.95);border-bottom:1px solid rgba(0,0,0,.09)}

#nav{display:flex;gap:2px;padding:6px 12px;overflow-x:auto;position:sticky;top:57px;z-index:99;backdrop-filter:blur(10px)}
body.dark #nav{background:rgba(15,23,42,.85);border-bottom:1px solid rgba(255,255,255,.06)}
body.light #nav{background:rgba(232,237,243,.95);border-bottom:1px solid rgba(0,0,0,.08)}

#main{max-width:700px;margin:0 auto;padding:18px 14px 80px}

/* CARDS */
.card{border-radius:14px;padding:14px;margin-bottom:10px;backdrop-filter:blur(8px)}
body.dark .card{background:rgba(30,41,59,.65);border:1px solid rgba(255,255,255,.07)}
body.light .card{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.09)}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,#34d399,#059669);border:none;color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#94a3b8;padding:9px 20px;border-radius:10px;font-size:14px;cursor:pointer}
body.light .btn-ghost{background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.12);color:#4a5568}
.btn-danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-accent{border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}

/* NAV BUTTONS */
.nav-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;transition:all .2s;border-bottom:2px solid transparent;background:none}
body.dark .nav-btn{color:#64748b}
body.light .nav-btn{color:#718096}
.nav-btn.active{border-bottom:2px solid #6ee7b7}
body.dark .nav-btn.active{color:#6ee7b7;background:rgba(110,231,183,.1)}
body.light .nav-btn.active{color:#059669;background:rgba(5,150,105,.08);border-bottom-color:#059669}

/* INPUTS */
.inp{border-radius:8px;padding:8px 11px;font-size:13px;outline:none;width:100%}
body.dark .inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:#e2e8f0}
body.light .inp{background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.15);color:#1a2535}
.sel{border-radius:8px;padding:8px 10px;font-size:13px;outline:none}
body.dark .sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);color:#e2e8f0}
body.light .sel{background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.15);color:#1a2535}

/* TASK CARD */
.task-card{display:flex;align-items:flex-start;gap:8px;border-radius:12px;padding:11px;margin-bottom:7px;transition:all .2s;position:relative;overflow:hidden;cursor:grab}
body.dark .task-card{background:rgba(30,41,59,.65);border:1px solid rgba(255,255,255,.07)}
body.light .task-card{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.09)}
.task-card.done{opacity:.6}
.task-card.done .task-title{text-decoration:line-through;color:#64748b}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.modal-box{border-radius:20px;padding:22px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
body.dark .modal-box{background:#0f172a;border:1px solid rgba(255,255,255,.08)}
body.light .modal-box{background:#fff;border:1px solid rgba(0,0,0,.1)}

/* FOCUS */
.focus-overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(20px)}
.focus-box{background:#0f172a;border:1px solid rgba(110,231,183,.15);border-radius:24px;padding:40px 32px;text-align:center;max-width:380px;width:100%;position:relative}

/* TOGGLE */
.toggle-wrap{width:46px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle-knob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;transition:right .3s;box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* MISC */
.section-title{font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.badge{background:#f87171;color:#fff;font-size:10px;border-radius:20px;padding:1px 6px;font-weight:700}
.aspect-chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:700;transition:all .2s;border:1px solid}
body.dark .aspect-chip{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);color:#64748b}
body.light .aspect-chip{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.09);color:#718096}
.period-label{font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:7px;color:#64748b}
.prog-track{height:6px;border-radius:10px;overflow:hidden}
body.dark .prog-track{background:rgba(255,255,255,.07)}
body.light .prog-track{background:rgba(0,0,0,.08)}
.sep{border:none;border-bottom:1px solid}
body.dark .sep{border-color:rgba(255,255,255,.06)}
body.light .sep{border-color:rgba(0,0,0,.07)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0}
.text-muted{color:#64748b}
body.light .text-muted{color:#718096}
.text-sub{font-size:12px;margin-top:2px}
body.dark .text-sub{color:#64748b}
body.light .text-sub{color:#718096}
.empty-state{text-align:center;padding:40px 20px;color:#64748b}
.accent-text{color:#6ee7b7}
body.light .accent-text{color:#059669}
@media(max-width:500px){
  #header{padding:12px 14px}
  #main{padding:14px 10px 80px}
  .task-card{padding:9px}
  .focus-box{padding:28px 20px}
}
</style>
</head>
<body class="dark">

<div id="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:7px">
      <span class="accent-text" style="font-size:22px;line-height:1">◈</span>
      <span style="font-size:20px;font-weight:900;letter-spacing:-.5px" id="logo-text">مساري</span>
    </div>
    <span id="today-chip" style="padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600"></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px 8px;border-radius:8px" id="theme-btn">☀️</button>
    <button onclick="showEmergency()" class="btn-danger" style="padding:5px 12px;font-size:12px">⚡ طوارئ</button>
  </div>
</div>

<nav id="nav">
  <button class="nav-btn active" data-view="today" onclick="switchView('today')"><span>◎</span><span>اليوم</span></button>
  <button class="nav-btn" data-view="week" onclick="switchView('week')"><span>▦</span><span>الأسبوع</span></button>
  <button class="nav-btn" data-view="postponed" onclick="switchView('postponed')"><span>⏳</span><span>المؤجلات</span><span class="badge" id="post-badge" style="display:none">0</span></button>
  <button class="nav-btn" data-view="stats" onclick="switchView('stats')"><span>◈</span><span>الإحصائيات</span></button>
  <button class="nav-btn" data-view="settings" onclick="switchView('settings')"><span>⚙</span><span>الإعدادات</span></button>
</nav>

<div id="main"></div>

<script>
// ===== CONSTANTS =====
var DAYS=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
var PERIODS=["الفجر","الصباح","الظهر","العصر","الليل"];
var ASPECTS=[
  {id:"faith",label:"الإيماني",color:"#a78bfa"},
  {id:"science",label:"العلمي",color:"#60a5fa"},
  {id:"skill",label:"المهاري",color:"#34d399"},
  {id:"culture",label:"الثقافي",color:"#fbbf24"},
  {id:"finance",label:"المالي",color:"#f87171"},
  {id:"sport",label:"الرياضي",color:"#fb923c"},
  {id:"other",label:"أخرى",color:"#94a3b8"}
];
var PRIS=[
  {id:"critical",label:"مهم جدًا",color:"#f87171"},
  {id:"high",label:"مهم",color:"#fb923c"},
  {id:"normal",label:"عادي",color:"#60a5fa"},
  {id:"optional",label:"اختياري",color:"#94a3b8"}
];
var ENERGY=[{id:"high",label:"عالية",icon:"⚡"},{id:"medium",label:"متوسطة",icon:"🔋"},{id:"low",label:"منخفضة",icon:"😴"}];

// ===== HELPERS =====
function uid(){return Math.random().toString(36).slice(2,9)}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function pad(n){return String(n).padStart(2,"0")}
function dateLabel(s){var d=new Date(s);return DAYS[d.getDay()]+" "+d.getDate()+"/"+(d.getMonth()+1)}
function calcPct(tasks){if(!tasks||!tasks.length)return 0;return Math.round(tasks.filter(function(t){return t.done}).length/tasks.length*100)}
function pctColor(p){return p>=80?"#34d399":p>=50?"#fbbf24":"#f87171"}
function isLight(){return document.body.classList.contains("light")}
function accentColor(){return isLight()?"#059669":"#6ee7b7"}
function weekDays(s){
  var d=new Date(s),sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
  var res=[];
  for(var i=0;i<7;i++){var x=new Date(sun);x.setDate(sun.getDate()+i);res.push(x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate()));}
  return res;
}
function fmtTimer(s){return pad(Math.floor(s/60))+":"+pad(s%60)}
function endTime(time,dur){if(!time||!dur)return"";var p=time.split(":").map(Number),t=p[0]*60+p[1]+dur;return pad(Math.floor(t/60)%24)+":"+pad(t%60)}

// ===== STATE =====
var ST;
try{ST=JSON.parse(localStorage.getItem("masari_v5"))||null;}catch(e){ST=null;}
if(!ST){
  var td=todayStr();
  ST={
    tasks:{},postponed:[],habits:[
      {id:uid(),title:"أذكار الصباح",aspect:"faith",time:"06:00"},
      {id:uid(),title:"تمرين رياضي",aspect:"sport",time:"17:00"}
    ],
    reviews:{},energy:{},
    settings:{theme:"dark",notifs:true,notifyBefore:15}
  };
  ST.tasks[td]=[
    {id:uid(),title:"أذكار الصباح",done:false,priority:"critical",aspect:"faith",period:"الفجر",time:"06:00",duration:15,note:"",subtasks:[],pinned:true,recurring:true},
    {id:uid(),title:"قراءة القرآن",done:false,priority:"critical",aspect:"faith",period:"الصباح",time:"07:00",duration:30,note:"",subtasks:[],pinned:true,recurring:true},
    {id:uid(),title:"مراجعة الدروس",done:false,priority:"high",aspect:"science",period:"الصباح",time:"09:00",duration:60,note:"",subtasks:[{id:uid(),title:"الرياضيات",done:false},{id:uid(),title:"الفيزياء",done:false}],pinned:false,recurring:false},
    {id:uid(),title:"تمرين رياضي",done:false,priority:"normal",aspect:"sport",period:"العصر",time:"17:00",duration:45,note:"",subtasks:[],pinned:false,recurring:true},
    {id:uid(),title:"قراءة كتاب",done:false,priority:"normal",aspect:"culture",period:"الليل",time:"21:00",duration:30,note:"",subtasks:[],pinned:false,recurring:false}
  ];
}

function saveState(){localStorage.setItem("masari_v5",JSON.stringify(ST))}

// ===== UI STATE =====
var currentView="today";
var selDate=todayStr();
var filterAsp=null;
var searchQ="";
var focusInterval=null;

// ===== BOOT =====
applyTheme();
renderHeader();
renderAll();

function applyTheme(){
  var t=ST.settings.theme;
  document.body.className=t;
  var btn=document.getElementById("theme-btn");
  if(btn)btn.textContent=t==="dark"?"☀️":"🌙";
}

function renderHeader(){
  var chip=document.getElementById("today-chip");
  if(chip){
    var acc=accentColor();
    chip.textContent=dateLabel(todayStr());
    chip.style.background=acc+"18";
    chip.style.border="1px solid "+acc+"33";
    chip.style.color=acc;
  }
  // Post badge
  var badge=document.getElementById("post-badge");
  if(badge){
    var n=(ST.postponed||[]).length;
    badge.style.display=n>0?"inline":"none";
    badge.textContent=n;
  }
}

function switchView(v){
  currentView=v;
  document.querySelectorAll(".nav-btn").forEach(function(b){
    b.classList.toggle("active",b.getAttribute("data-view")===v);
  });
  renderAll();
}

function renderAll(){
  renderHeader();
  var main=document.getElementById("main");
  if(!main)return;
  main.innerHTML="";
  if(currentView==="today")main.appendChild(buildToday());
  else if(currentView==="week")main.appendChild(buildWeek());
  else if(currentView==="postponed")main.appendChild(buildPostponed());
  else if(currentView==="stats")main.appendChild(buildStats());
  else if(currentView==="settings")main.appendChild(buildSettings());
}

// ===== TODAY =====
function buildToday(){
  var wrap=mk("div");
  var tasks=ST.tasks[selDate]||[];
  var pri={critical:0,high:1,normal:2,optional:3};
  var filtered=tasks.filter(function(t){return(!filterAsp||t.aspect===filterAsp)&&(!searchQ||t.title.indexOf(searchQ)>=0)});
  filtered.sort(function(a,b){return(pri[a.priority]||2)-(pri[b.priority]||2)});
  var pct=calcPct(tasks);
  var done=tasks.filter(function(t){return t.done}).length;

  // Stats bar
  var bar=mk("div","display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px");
  var stats=[
    {label:"الإنجاز",v:pct+"%",c:pctColor(pct)},
    {label:"المهام",v:done+"/"+tasks.length,c:""},
    {label:"مؤجلات",v:(ST.postponed||[]).length,c:"#f87171"},
    {label:"أساسية",v:tasks.filter(function(t){return t.pinned&&!t.done}).length,c:"#fb923c"}
  ];
  stats.forEach(function(s){
    var card=mk("div","text-align:center;padding:12px 8px");card.className="card";
    var vEl=mk("div","font-size:20px;font-weight:900;line-height:1;margin-bottom:3px");
    vEl.textContent=s.v;if(s.c)vEl.style.color=s.c;
    var lEl=mk("div","font-size:11px");lEl.textContent=s.label;lEl.className="text-muted";
    card.appendChild(vEl);card.appendChild(lEl);bar.appendChild(card);
  });
  wrap.appendChild(bar);

  // Progress bar
  var pw=mk("div","display:flex;align-items:center;gap:10px;margin-bottom:14px");
  var pt=mk("div","flex:1");pt.className="prog-track";
  var pf=mk("div","height:100%;border-radius:10px;transition:width .6s");
  pf.style.width=pct+"%";pf.style.background=pctColor(pct);
  pt.appendChild(pf);
  var pl=mk("span","font-size:12px;white-space:nowrap");pl.textContent=done+" / "+tasks.length;pl.className="text-muted";
  pw.appendChild(pt);pw.appendChild(pl);
  wrap.appendChild(pw);

  // Energy
  var ec=mk("div");ec.className="card";
  var el2=mk("div","font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px");el2.textContent="مستوى الطاقة";el2.className="text-muted";
  ec.appendChild(el2);
  var er=mk("div","display:flex;gap:6px;flex-wrap:wrap");
  ENERGY.forEach(function(e){
    var active=ST.energy[selDate]===e.id;
    var acc=accentColor();
    var b=mk("button","padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s");
    b.textContent=e.icon+" "+e.label;
    b.style.background=active?acc+"25":"";
    b.style.border=active?"1px solid "+acc+"55":"1px solid rgba(128,128,128,.2)";
    b.style.color=active?acc:"";
    b.onclick=function(){ST.energy[selDate]=e.id;saveState();renderAll();};
    er.appendChild(b);
  });
  ec.appendChild(er);

  var topRow2=mk("div","display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:stretch");
  topRow2.appendChild(ec);
  var acc=accentColor();
  var revBtn=mk("button","padding:12px 14px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap");
  revBtn.textContent="📝 مراجعة اليوم";
  revBtn.style.background=acc+"15";revBtn.style.border="1px solid "+acc+"33";revBtn.style.color=acc;
  revBtn.onclick=showReviewModal;
  topRow2.appendChild(revBtn);
  wrap.appendChild(topRow2);

  // Aspect filter
  var ar=mk("div","display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px");
  var allB=mk("button");allB.className="aspect-chip";allB.textContent="الكل";
  if(!filterAsp){allB.style.background=acc+"20";allB.style.borderColor=acc+"44";allB.style.color=acc;}
  allB.onclick=function(){filterAsp=null;renderAll();};
  ar.appendChild(allB);
  ASPECTS.forEach(function(a){
    var active=filterAsp===a.id;
    var b=mk("button");b.className="aspect-chip";b.textContent=a.label;
    if(active){b.style.background=a.color+"20";b.style.borderColor=a.color+"55";b.style.color=a.color;}
    b.onclick=function(){filterAsp=filterAsp===a.id?null:a.id;renderAll();};
    ar.appendChild(b);
  });
  wrap.appendChild(ar);

  // Search
  var sw=mk("div","display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:14px");
  sw.className="card";sw.style.marginBottom="14px";
  var si=mk("span","font-size:14px;opacity:.5");si.textContent="🔍";
  var inp=mk("input","background:none;border:none;outline:none;font-size:13px;flex:1;width:100%");
  inp.type="text";inp.placeholder="بحث في المهام...";inp.value=searchQ;
  inp.style.color=isLight()?"#1a2535":"#e2e8f0";
  inp.oninput=function(){searchQ=this.value;renderAll();};
  sw.appendChild(si);sw.appendChild(inp);
  wrap.appendChild(sw);

  // Tasks
  var hasTasks=false;
  PERIODS.forEach(function(period){
    var pts=filtered.filter(function(t){return t.period===period});
    if(!pts.length)return;
    hasTasks=true;
    var sec=mk("div","margin-bottom:14px");
    var pl=mk("div");pl.className="period-label";pl.textContent=period;
    sec.appendChild(pl);
    pts.forEach(function(t){sec.appendChild(buildTaskCard(t));});
    wrap.appendChild(sec);
  });
  filtered.filter(function(t){return!t.period||PERIODS.indexOf(t.period)<0}).forEach(function(t){
    hasTasks=true;wrap.appendChild(buildTaskCard(t));
  });

  if(!hasTasks){
    var em=mk("div");em.className="empty-state";
    em.innerHTML="<div style='font-size:48px;margin-bottom:10px'>✨</div><div>لا توجد مهام اليوم</div>";
    wrap.appendChild(em);
  }

  // Add task button
  var ab=mk("button","width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px");
  ab.textContent="+ إضافة مهمة";
  ab.style.background=acc+"12";ab.style.border="1px dashed "+acc+"44";ab.style.color=acc;
  ab.onclick=function(){showTaskForm(null);};
  wrap.appendChild(ab);

  // Postponed banner
  if((ST.postponed||[]).length>0){
    var bn=mk("button","width:100%;margin-top:10px;padding:10px;border-radius:10px;font-size:13px;cursor:pointer");
    bn.textContent="⏳ لديك "+ST.postponed.length+" مهمة مؤجلة — اضغط للمراجعة";
    bn.style.background="rgba(248,113,113,.08)";bn.style.border="1px solid rgba(248,113,113,.2)";bn.style.color="#f87171";
    bn.onclick=function(){switchView("postponed");};
    wrap.appendChild(bn);
  }
  return wrap;
}

// ===== TASK CARD =====
function buildTaskCard(task){
  var pri=PRIS.find(function(p){return p.id===task.priority})||PRIS[2];
  var asp=ASPECTS.find(function(a){return a.id===task.aspect});
  var card=mk("div");card.className="task-card"+(task.done?" done":"");
  card.setAttribute("data-id",task.id);

  // Priority stripe
  var stripe=mk("div","position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:0 12px 12px 0");
  stripe.style.background=pri.color;card.appendChild(stripe);

  // Checkbox

    meta.forEach(function(m){

      if(m.c)s.style.color=m.c;

      sw.appendChild(sr);
    });
    content.appendChild(sw);
  }
  card.appendChild(content);

  // Actions
  var acts=mk("div","display:flex;flex-direction:column;gap:2px;flex-shrink:0");
  function actBtn(ic,fn){
    var b=mk("button","background:none;border:none;cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px");

  var db=actBtn("✕",function(){deleteTask(task.id);});db.style.color="#f87171";
  acts.appendChild(db);

  // Drag

  card.addEventListener("dragover",function(e){e.preventDefault();card.style.borderColor=accentColor();});

  card.addEventListener("drop",function(){if(dragId&&dragId!==task.id)reorderTasks(dragId,task.id);card.style.borderColor="";dragId=null;});

  return card;
}

      var st=mk("span","flex:1;font-size:13px");st.textContent="• "+s.title;st.className="text-muted";
      var db=mk("button","background:none;border:none;cursor:pointer;font-size:13px;color:#f87171");db.textContent="✕";
      db.onclick=function(){form.subtasks.splice(i,1);renderSubs();};
      sr.appendChild(st);sr.appendChild(db);subList.appendChild(sr);
    });
    var sr2=mk("div","display:flex;gap:6px;margin-bottom:12px");
    var si=mk("input");si.type="text";si.className="inp";si.style.flex="1";si.placeholder="خطوة جديدة...";
    var addS=mk("button","border:none;padding:0 14px;border-radius:8px;cursor:pointer;font-weight:900;font-size:16px;height:34px");
    addS.textContent="+";addS.style.background=acc;addS.style.color="#0f172a";
    addS.onclick=function(){if(si.value.trim()){form.subtasks.push({id:uid(),title:si.value.trim(),done:false});renderSubs();}};
    si.onkeydown=function(e){if(e.key==="Enter"&&si.value.trim()){form.subtasks.push({id:uid(),title:si.value.trim(),done:false});renderSubs();}};
    sr2.appendChild(si);sr2.appendChild(addS);subList.appendChild(sr2);
  }
  renderSubs();

  var togs=mk("div","display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px");
  [["pinned","📌 مثبتة"],["recurring","🔄 متكررة"]].forEach(function(kl){
    var lb=mk("label","display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px");lb.className="text-muted";
    var cb=mk("input");cb.type="checkbox";cb.checked=!!form[kl[0]];
    cb.onchange=function(){form[kl[0]]=this.checked;};
    lb.appendChild(cb);lb.appendChild(document.createTextNode(kl[1]));togs.appendChild(lb);
  });
  wrap.appendChild(togs);

  var br=mk("div","display:flex;gap:8px");
  var sv=mk("button");sv.className="btn-primary";sv.textContent="حفظ";
  sv.onclick=function(){
    if(!form.title.trim())return;
    if(isEdit){ST.tasks[selDate]=(ST.tasks[selDate]||[]).map(function(x){return x.id===task.id?Object.assign({},x,form):x;});}
    else{if(!ST.tasks[selDate])ST.tasks[selDate]=[];ST.tasks[selDate].push(Object.assign({},form,{id:uid(),done:false}));}
    saveState();closeModal();renderAll();
  };
  var cn=mk("button");cn.className="btn-ghost";cn.textContent="إلغاء";cn.onclick=closeModal;
  br.appendChild(sv);br.appendChild(cn);wrap.appendChild(br);
  showModal(wrap);
  setTimeout(function(){var i=document.querySelector("#app-modal input[type=text]");if(i)i.focus();},60);
}

function showReviewModal(){
  var rev=ST.reviews[selDate]||{};var vals=Object.assign({},rev);
  var wrap=mk("div");wrap.appendChild(modalHeader("📝 مراجعة "+dateLabel(selDate)));
  var acc=accentColor();
  [["what_worked","✅ ماذا نجح؟"],["what_failed","❌ لماذا لم يكتمل؟"],["how_was_day","💭 كيف كان اليوم؟"]].forEach(function(kl){
    var lb=mk("div","font-size:12px;font-weight:700;margin-bottom:5px");lb.textContent=kl[1];lb.className="text-muted";
    var ta=mk("textarea");ta.className="inp";ta.rows=3;ta.style.marginBottom="10px";ta.style.resize="vertical";ta.value=vals[kl[0]]||"";
    ta.oninput=(function(k,el){return function(){vals[k]=el.value;};})(kl[0],ta);
    wrap.appendChild(lb);wrap.appendChild(ta);
  });
  var br=mk("div","display:flex;gap:8px;margin-top:6px");
  var sv=mk("button");sv.className="btn-primary";sv.textContent="حفظ";
  sv.onclick=function(){ST.reviews[selDate]=vals;saveState();closeModal();};
  var cn=mk("button");cn.className="btn-ghost";cn.textContent="إلغاء";cn.onclick=closeModal;
  br.appendChild(sv);br.appendChild(cn);wrap.appendChild(br);
  showModal(wrap);
}

function showEmergency(){
  var wrap=mk("div");wrap.appendChild(modalHeader("⚡ وضع الطوارئ"));
  var p=mk("div","font-size:14px;line-height:1.8;margin-bottom:16px");p.textContent="سيتم الاحتفاظ بالمهام المهمة جداً والمثبتة فقط، وتأجيل الباقي تلقائيًا.";p.className="text-muted";wrap.appendChild(p);
  var br=mk("div","display:flex;gap:8px");
  var go=mk("button");go.className="btn-danger";go.textContent="تفعيل الطوارئ";
  go.onclick=function(){
    var tasks=ST.tasks[selDate]||[];
    var keep=tasks.filter(function(t){return t.priority==="critical"||t.pinned;});
    var move=tasks.filter(function(t){return t.priority!=="critical"&&!t.pinned&&!t.done;});
    ST.tasks[selDate]=keep;
    move.forEach(function(t){ST.postponed.push(Object.assign({},t,{originalDate:selDate,postponedAt:new Date().toISOString()}));});
    saveState();closeModal();renderAll();
  };
  var cn=mk("button");cn.className="btn-ghost";cn.textContent="إلغاء";cn.onclick=closeModal;
  br.appendChild(go);br.appendChild(cn);wrap.appendChild(br);showModal(wrap);
}

function showCopyModal(fromDate,days){
  var wrap=mk("div");wrap.appendChild(modalHeader("نسخ "+dateLabel(fromDate)));
  var p=mk("div","font-size:13px;margin-bottom:12px");p.textContent="نسخ مهام هذا اليوم إلى:";p.className="text-muted";wrap.appendChild(p);
  var gr=mk("div","display:flex;gap:6px;flex-wrap:wrap");
  days.filter(function(d){return d!==fromDate;}).forEach(function(d){
    var b=mk("button","padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600");
    b.style.background="rgba(128,128,128,.1)";b.style.border="1px solid rgba(128,128,128,.15)";
    b.textContent=dateLabel(d);
    b.onclick=function(){
      ST.tasks[d]=(ST.tasks[fromDate]||[]).map(function(t){return Object.assign({},t,{id:uid(),done:false});});
      saveState();closeModal();renderAll();
    };
    gr.appendChild(b);
  });
  wrap.appendChild(gr);showModal(wrap);
}

// ===== FOCUS =====
function openFocus(task){
  if(focusInterval)clearInterval(focusInterval);
  var timer=task.duration*60;var running=false;
  var ov=mk("div");ov.className="focus-overlay";ov.id="focus-modal";
  var box=mk("div");box.className="focus-box";
  var xb=mk("button","position:absolute;top:14px;left:14px;background:none;border:none;cursor:pointer;font-size:18px");
  xb.className="text-muted";xb.textContent="✕";xb.onclick=function(){clearInterval(focusInterval);ov.remove();};
  var tn=mk("div","font-size:20px;font-weight:800;color:#e2e8f0;margin-bottom:8px;line-height:1.4");tn.textContent=task.title;
  var te=mk("div","font-size:60px;font-weight:900;color:#6ee7b7;letter-spacing:-2px;margin:16px 0;font-variant-numeric:tabular-nums");te.textContent=fmtTimer(timer);
  var pb=mk("div","height:4px;border-radius:10px;overflow:hidden;margin:0 8px;background:rgba(255,255,255,.08)");
  var pf=mk("div","height:100%;background:#6ee7b7;border-radius:10px;width:0%;transition:width .5s");pb.appendChild(pf);
  var br=mk("div","display:flex;gap:12px;justify-content:center;margin-top:24px");
  var pl=mk("button","padding:10px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(110,231,183,.15);border:1px solid rgba(110,231,183,.3);color:#6ee7b7");
  pl.textContent="▶ بدء";
  pl.onclick=function(){
    running=!running;pl.textContent=running?"⏸ إيقاف":"▶ بدء";
    if(running){
      focusInterval=setInterval(function(){
        if(timer<=0){clearInterval(focusInterval);running=false;return;}
        timer--;te.textContent=fmtTimer(timer);
        pf.style.width=Math.round((1-timer/(task.duration*60))*100)+"%";
      },1000);
    } else {clearInterval(focusInterval);}
  };
  var dn=mk("button");dn.className="btn-primary";dn.textContent="✓ إنجاز";
  dn.onclick=function(){clearInterval(focusInterval);toggleTask(task.id);ov.remove();};
  br.appendChild(pl);br.appendChild(dn);
  box.appendChild(xb);box.appendChild(tn);box.appendChild(te);box.appendChild(pb);box.appendChild(br);
  ov.appendChild(box);document.body.appendChild(ov);
}

// ===== TASK OPS =====
function toggleTask(id){
  ST.tasks[selDate]=(ST.tasks[selDate]||[]).map(function(t){return t.id===id?Object.assign({},t,{done:!t.done}):t;});
  saveState();renderAll();
}
function toggleSubtask(taskId,subId){
  ST.tasks[selDate]=(ST.tasks[selDate]||[]).map(function(t){
    if(t.id!==taskId)return t;
    return Object.assign({},t,{subtasks:(t.subtasks||[]).map(function(s){return s.id===subId?Object.assign({},s,{done:!s.done}):s;})});
  });
  saveState();renderAll();
}
function deleteTask(id){
  ST.tasks[selDate]=(ST.tasks[selDate]||[]).filter(function(t){return t.id!==id;});
  saveState();renderAll();
}
function postponeTask(id){
  var task=(ST.tasks[selDate]||[]).find(function(t){return t.id===id;});
  if(!task)return;
  ST.postponed.push(Object.assign({},task,{originalDate:selDate,postponedAt:new Date().toISOString()}));
  ST.tasks[selDate]=ST.tasks[selDate].filter(function(t){return t.id!==id;});
  saveState();renderAll();
}
function reschedule(id,newDate){
  var pt=(ST.postponed||[]).find(function(x){return x.id===id;});
  if(!pt)return;
  var nt=Object.assign({},pt,{id:uid(),done:false});
  delete nt.originalDate;delete nt.postponedAt;
  if(!ST.tasks[newDate])ST.tasks[newDate]=[];
  ST.tasks[newDate].push(nt);
  ST.postponed=ST.postponed.filter(function(x){return x.id!==id;});
  saveState();renderAll();
}
function reorderTasks(fromId,toId){
  var tasks=ST.tasks[selDate]||[];
  var fi=tasks.findIndex(function(t){return t.id===fromId;});
  var ti=tasks.findIndex(function(t){return t.id===toId;});
  if(fi<0||ti<0)return;
  var moved=tasks.splice(fi,1)[0];tasks.splice(ti,0,moved);
  saveState();renderAll();
}
function toggleTheme(){
  ST.settings.theme=ST.settings.theme==="dark"?"light":"dark";
  saveState();applyTheme();renderAll();
}

// ===== DOM HELPER =====
function mk(tag,css){
  var e=document.createElement(tag);
  if(css)e.style.cssText=css;
  return e;
}
</script>
