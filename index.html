        .who-section .content-card, .who-section .content-card p { }

        .patience-card { background: var(--dark-card); border: 1px solid var(--dark-border); border-right: 3px solid #8B0000; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .patience-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--dark-border); }
        .patience-icon { font-size: 32px; flex-shrink: 0; }
        .patience-name { font-family: 'Amiri', serif; font-size: 22px; color: var(--text-primary); margin-bottom: 4px; }
        .patience-title-text { font-size: 14px; color: #EF9A9A; }
        .patience-content { margin-bottom: 20px; }
        .patience-intro { border-right: 3px solid var(--gold) !important; }

        /* FARROON SECTION */
        .farroon-card { background: var(--dark-card); border: 1px solid var(--dark-border); border-right: 3px solid #E65100; border-radius: var(--radius); padding: 24px; margin-bottom: 16px; transition: all 0.2s; }
        .farroon-card:hover { border-color: #E65100; box-shadow: 0 4px 20px rgba(230,81,0,0.1); }
        .farroon-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .farroon-icon { font-size: 24px; }
        .farroon-name { font-family: 'Amiri', serif; font-size: 20px; color: #FFAB91; }

        /* BATTLES IMPROVED */
        .battle-card { background: var(--dark-card); border: 1px solid var(--dark-border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; transition: all 0.2s; }
        .battle-card.expanded { border-color: var(--gold-dark); box-shadow: 0 4px 24px rgba(201,168,76,0.12); }
        .battle-card-top { padding: 20px 24px; cursor: pointer; }
        .battle-card-top:hover { background: rgba(255,255,255,0.02); }
        .battle-header { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
        .battle-icon-wrap { position: relative; flex-shrink: 0; }
        .battle-icon { font-size: 28px; }
        .battle-num { position: absolute; top: -6px; right: -6px; background: var(--gold-dark); color: #000; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .battle-title-wrap { flex: 1; min-width: 180px; }
        .battle-name { font-family: 'Amiri', serif; font-size: 22px; color: var(--text-primary); margin-bottom: 6px; }
        .battle-meta-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .battle-meta-item { font-size: 12px; color: var(--text-dim); }
        .battle-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .battle-toggle { font-size: 13px; color: var(--gold); font-weight: bold; }
        .battle-significance { font-size: 13px; color: var(--text-secondary); font-style: italic; }
        .battle-expanded { border-top: 1px solid var(--dark-border); padding: 24px; background: rgba(0,0,0,0.15); }
        .battle-full-result { font-size: 14px; color: #81C784; background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.15); padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; }
        .battle-para { color: var(--text-secondary); font-size: 15px; line-height: 2; margin-bottom: 16px; }
        .battle-heroes { padding-top: 16px; border-top: 1px solid var(--dark-border); margin-top: 8px; }
        .heroes-label { font-size: 13px; color: var(--gold); display: block; margin-bottom: 10px; }
        .heroes-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .battle-result { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; text-align: center; }
        .battle-result.win { background: rgba(46,125,50,0.2); color: #81C784; border: 1px solid rgba(46,125,50,0.3); }
        .battle-result.lesson { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
        .hero-badge { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.15); color: var(--gold); font-size: 12px; padding: 4px 12px; border-radius: 20px; }

        @media (max-width: 700px) {
          .hero { padding: 36px 20px; }
          .stats-row { grid-template-columns: repeat(2, 1fr); }
          .timeline::before { right: 20px; }
          .timeline-item { flex-direction: row !important; }
          .timeline-content { width: calc(100% - 70px); margin-right: 16px !important; margin-left: 0 !important; }
          .detail-hero { flex-direction: column; }
          .nav-logo { display: none; }
        }
      `}</style>

      {/* Navigation */}
      <nav className="nav">
        <div className="nav-inner">
          <span className="nav-logo">موسوعة الصحابة ✦</span>
          {navItems.map(item => (
            <button
              key={item.id}
              className={`nav-btn ${activeSection === item.id || (item.id === "companions" && activeSection === "companion-detail") ? "active" : ""}`}
              onClick={() => { setActiveSection(item.id); setSelectedCompanion(null); setExpandedStory(null); }}
            >
              {item.icon} {item.label}
            </button>
          ))}
        </div>
      </nav>

      {/* Main content */}
      <main className="main">
        {sections[activeSection] ? sections[activeSection]() : renderHome()}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SahabaEncyclopedia />);
    </script>
</body>
</html>
